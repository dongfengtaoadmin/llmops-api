# ============================================================
# GPT-4o 模型配置文件
# ============================================================
# 说明：该配置文件定义了 OpenAI GPT-4o 模型的基础信息、功能特性和参数配置
# ============================================================

# 模型基础信息
model: gpt-4o                    # 模型标识符，用于API调用时指定模型（如 OpenAI API 的 model 参数）
label: gpt-4o                    # 模型显示名称，用于前端界面展示给用户
model_type: chat                 # 模型类型：chat（对话模型）、completion（文本补全模型）等

# 模型支持的功能特性列表
features:
  - tool_call                    # 支持工具调用/函数调用（Function Calling），允许模型调用外部工具
  - agent_thought                # 支持Agent思维链/推理过程展示，可以显示模型的推理步骤
  - image_input                  # 支持图像输入（多模态能力），可以处理图片内容

# 模型上下文窗口配置
context_window: 128000           # 上下文窗口大小：模型能处理的最大token数（输入+输出总和上限）
max_output_tokens: 16384         # 最大输出token数：模型单次回复生成的最大token数量

# 模型属性配置（用于内部系统标识和调用）
attributes:
  model: gpt-4o                  # 内部系统使用的模型标识，可能与API调用的model参数一致

# ============================================================
# 模型参数配置
# ============================================================
# 说明：这些参数控制模型的生成行为，影响输出质量和风格
# ============================================================
parameters:
  # 温度参数（temperature）：控制输出的随机性和创造性
  # 取值范围：0.0 - 2.0
  # - 低值（0.1-0.3）：输出更确定、一致，适合精确任务如代码生成、 factual 回答
  # - 高值（0.7-1.0）：输出更随机、有创造性，适合创意写作、 brainstorming
  # - 值为 0 时输出最确定，但可能导致内容过于机械
  - name: temperature
    use_template: temperature    # 使用预定义的温度参数模板（包含类型、范围等配置）

  # Top-P采样参数（top_p）：核采样/概率累积阈值
  # 取值范围：0.0 - 1.0
  # - 控制模型从概率累积达到 top_p 值的候选 token 中采样
  # - 低值（0.1-0.5）：只从最可能的 token 中选择，输出更保守
  # - 高值（0.9-1.0）：考虑更多候选 token，输出更多样
  # 建议：与 temperature 参数调整其中一个即可，不建议同时大幅调整
  - name: top_p
    use_template: top_p          # 使用预定义的 top_p 参数模板

  # 存在惩罚参数（presence_penalty）：惩罚已出现的 token
  # 取值范围：-2.0 - 2.0
  # - 正值：降低已出现过的 token 的概率，鼓励模型谈论新话题
  # - 负值：增加已出现过 token 的概率，可能导致重复
  # - 值为 0：不进行惩罚
  # 建议：0.1-0.5 可以减少话题重复，超过 1.0 可能导致输出不连贯
  - name: presence_penalty
    use_template: presence_penalty  # 使用预定义的存在惩罚参数模板

  # 频率惩罚参数（frequency_penalty）：根据出现频率进行惩罚
  # 取值范围：-2.0 - 2.0
  # - 正值：根据 token 出现频率降低其概率，高频出现的词会被更强惩罚
  # - 负值：根据频率增加概率，可能导致重复内容
  # - 值为 0：不进行惩罚
  # 建议：0.3-0.7 可以有效减少词语/句式重复，超过 1.0 可能影响流畅度
  - name: frequency_penalty
    use_template: frequency_penalty  # 使用预定义的频率惩罚参数模板

  # 最大输出token数（max_tokens）：限制单次回复的长度
  # 取值范围：1 - max_output_tokens（16384）
  # - 控制模型生成内容的最大长度
  # - 值过小：可能导致回复被截断，内容不完整
  # - 值过大：可能增加成本和响应时间
  # 建议：根据任务需求设置，一般对话 1000-2000，长文本生成可设置更高
  - name: max_tokens
    use_template: max_tokens     # 使用预定义的 max_tokens 参数模板
    default: 4096                # 默认值：4096 tokens，平衡成本和回复质量

# ============================================================
# use_template 说明
# ============================================================
# use_template 参数表示使用预定义的参数模板配置
# 模板通常定义在统一的配置文件中，包含：
# - 参数类型（type）：float、integer 等
# - 取值范围（min/max）：参数的最小最大值
# - 前端显示配置：如何在界面上展示该参数（滑块、输入框等）
# - 参数描述：用于前端显示的帮助文本
#
# 使用模板的好处：
# 1. 统一管理：所有模型使用相同的参数定义，便于维护
# 2. 前端一致：确保不同模型在前端显示相同的参数控件
# 3. 类型安全：模板定义了参数类型和范围，减少错误
# ============================================================
metadata:
  pricing:
    input: 0.0183
    output: 0.0733
    unit: 0.001
    currency: RMB
