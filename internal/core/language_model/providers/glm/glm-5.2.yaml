model: glm-5.2
label: glm-5.2
model_type: chat
features:
  - tool_call
  - agent_thought
context_window: 1000000
max_output_tokens: 8192
attributes:
  model: glm-5.2
parameters:
  - name: temperature
    use_template: temperature
    default: 0.7
    max: 1
  - name: top_p
    use_template: top_p
    default: 0.9
  - name: max_tokens
    use_template: max_tokens
    default: 4096
metadata:
  pricing:
    input: 0.0103
    output: 0.0323
    unit: 0.001
    currency: RMB
