model: kimi-k2.5
label: kimi-k2.5
model_type: chat
features:
  - tool_call
  - agent_thought
context_window: 128000
max_output_tokens: 8192
attributes:
  model: kimi-k2.5
parameters:
  - name: temperature
    use_template: temperature
    default: 0.7
    max: 1
  - name: top_p
    use_template: top_p
    default: 0.9
  - name: max_tokens
    use_template: max_tokens
    default: 4096
