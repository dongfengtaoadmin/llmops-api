model: ernie-3.5-128k
label: ernie-3.5-128k
model_type: chat
features:
  - tool_call
  - agent_thought
context_window: 128000
max_output_tokens: 8196
attributes:
  model: ERNIE-3.5-128K
parameters:
  - name: temperature
    use_template: temperature
    max: 1
    default: 0.8
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_output_tokens
    use_template: max_tokens
    default: 4096
    max: 8196
  - name: disable_search
    label: 禁用搜索
    type: boolean
    help: 禁用模型自行进行外部搜索。
    required: false
    default: false
metadata:
  pricing:
    input: 0.0008
    output: 0.0020
    unit: 0.001
    currency: RMB
