<svg width="760" height="800" viewBox="0 0 760 800" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .node-gray   { fill: #e8e6e0; stroke: #888780; stroke-width: 1; }
    .node-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 1; }
    .node-blue   { fill: #E6F1FB; stroke: #185FA5; stroke-width: 1; }
    .node-amber  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; }
    .node-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
    .node-coral  { fill: #FAECE7; stroke: #993C1D; stroke-width: 1; }
    .lbl  { font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
    .sub  { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .arr  { stroke: #999; stroke-width: 1.2; fill: none; }
    .purple-lbl { fill: #3C3489; }
    .blue-lbl   { fill: #0C447C; }
    .amber-lbl  { fill: #633806; }
    .teal-lbl   { fill: #085041; }
    .coral-lbl  { fill: #4A1B0C; }
    .gray-lbl   { fill: #2C2C2A; }
  </style>
</defs>

<!-- ── __start__ ── -->
<ellipse cx="380" cy="38" rx="64" ry="24" class="node-gray"/>
<text class="lbl gray-lbl" x="380" y="43" text-anchor="middle">__start__</text>

<!-- __start__ → start -->
<line x1="380" y1="62" x2="380" y2="102" class="arr" marker-end="url(#arrow)"/>

<!-- ── start ── -->
<rect x="210" y="104" width="340" height="58" rx="10" class="node-purple"/>
<text class="lbl purple-lbl" x="380" y="127" text-anchor="middle">start</text>
<text class="sub" x="380" y="146" text-anchor="middle">18d938c4-ecd7-4a6b-9403-3625224b96cc</text>

<!-- 四条分支线从 start 出发 -->
<!-- → dataset_retrieval (col1 x=90) -->
<path d="M210 133 L90 133 L90 232" class="arr" marker-end="url(#arrow)"/>
<!-- → http_request (col2 x=255) -->
<path d="M330 162 L255 162 L255 232" class="arr" marker-end="url(#arrow)"/>
<!-- → tool_2f6c (col3 x=470) -->
<path d="M470 162 L470 232" class="arr" marker-end="url(#arrow)"/>
<!-- → tool_e9fc (col4 x=635) -->
<path d="M550 133 L635 133 L635 232" class="arr" marker-end="url(#arrow)"/>

<!-- ── dataset_retrieval (col1) ── -->
<rect x="20" y="234" width="160" height="66" rx="8" class="node-blue"/>
<text class="lbl blue-lbl" x="100" y="258" text-anchor="middle">dataset_retrieval</text>
<text class="sub" x="100" y="274" text-anchor="middle">868b5769-1925-4e7b</text>
<text class="sub" x="100" y="287" text-anchor="middle">-8aa4-af7c3d444d91</text>

<!-- ── http_request (col2) ── -->
<rect x="192" y="234" width="160" height="66" rx="8" class="node-blue"/>
<text class="lbl blue-lbl" x="272" y="258" text-anchor="middle">http_request</text>
<text class="sub" x="272" y="274" text-anchor="middle">675fca50-12??-</text>
<text class="sub" x="272" y="287" text-anchor="middle">0c7f-ff5b334c</text>

<!-- ── tool_2f6c (col3) ── -->
<rect x="380" y="234" width="165" height="66" rx="8" class="node-amber"/>
<text class="lbl amber-lbl" x="462" y="258" text-anchor="middle">tool</text>
<text class="sub" x="462" y="274" text-anchor="middle">2f6cf40d-0219-421b</text>
<text class="sub" x="462" y="287" text-anchor="middle">-92ff-229fdde15ecb</text>

<!-- ── tool_e9fc (col4) ── -->
<rect x="562" y="234" width="165" height="66" rx="8" class="node-amber"/>
<text class="lbl amber-lbl" x="644" y="258" text-anchor="middle">tool</text>
<text class="sub" x="644" y="274" text-anchor="middle">e9fc1f95-1a59-4ba4</text>
<text class="sub" x="644" y="287" text-anchor="middle">-a87d-2ad349287234</text>

<!-- dataset_retrieval → llm -->
<line x1="100" y1="300" x2="100" y2="390" class="arr" marker-end="url(#arrow)"/>
<!-- http_request → template_transform -->
<line x1="272" y1="300" x2="272" y2="390" class="arr" marker-end="url(#arrow)"/>

<!-- ── llm (col1) ── -->
<rect x="20" y="392" width="160" height="58" rx="8" class="node-purple"/>
<text class="lbl purple-lbl" x="100" y="415" text-anchor="middle">llm</text>
<text class="sub" x="100" y="433" text-anchor="middle">eba75e0b-21b7-46ed</text>

<!-- ── template_transform (col2) ── -->
<rect x="192" y="392" width="160" height="58" rx="8" class="node-teal"/>
<text class="lbl teal-lbl" x="272" y="413" text-anchor="middle">template_transform</text>
<text class="sub" x="272" y="430" text-anchor="middle">623b7671-0bc2-446c</text>

<!-- llm → code -->
<line x1="100" y1="450" x2="100" y2="530" class="arr" marker-end="url(#arrow)"/>

<!-- ── code (col1) ── -->
<rect x="20" y="532" width="160" height="58" rx="8" class="node-coral"/>
<text class="lbl coral-lbl" x="100" y="555" text-anchor="middle">code</text>
<text class="sub" x="100" y="573" text-anchor="middle">4a9ed43d-e886-49f7</text>

<!-- 汇聚线 → end -->
<!-- code → end -->
<path d="M100 590 L100 680 L212 680" class="arr" marker-end="url(#arrow)"/>
<!-- template_transform → end -->
<path d="M272 450 L272 680" class="arr" marker-end="url(#arrow)"/>
<!-- tool_2f6c → end -->
<path d="M462 300 L462 680 L432 680" class="arr" marker-end="url(#arrow)"/>
<!-- tool_e9fc → end -->
<path d="M644 300 L644 680 L432 680" class="arr" marker-end="url(#arrow)"/>

<!-- ── end ── -->
<rect x="212" y="658" width="300" height="58" rx="10" class="node-purple"/>
<text class="lbl purple-lbl" x="362" y="681" text-anchor="middle">end</text>
<text class="sub" x="362" y="700" text-anchor="middle">860c8411-37ed-4872-b53f-30afa0290211</text>

<!-- end → __end__ -->
<line x1="362" y1="716" x2="362" y2="756" class="arr" marker-end="url(#arrow)"/>

<!-- ── __end__ ── -->
<ellipse cx="362" cy="776" rx="56" ry="24" class="node-gray"/>
<text class="lbl gray-lbl" x="362" y="781" text-anchor="middle">__end__</text>

</svg>
